name: Build KaiOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build and Package
      run: npm run build

    - name: Upload OmniSD Package
      uses: actions/upload-artifact@v4
      with:
        name: kaios-ludo-omnisd
        path: packages/kaios-ludo-omnisd.zip
