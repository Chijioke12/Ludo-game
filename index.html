<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KaiOS Ludo Phaser</title>
    <link rel="icon" type="image/jpeg" href="/assets/ludo_icon.jpg">
    <style>
      body { 
        margin: 0; 
        background-color: #000; 
        display: flex; 
        flex-direction: column;
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        overflow: hidden; 
        font-family: sans-serif;
      }
      #game-container { 
        width: 240px; 
        height: 320px; 
        outline: 2px solid #555; 
        outline-offset: -2px; 
        background-color: #1E2235;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }
      #loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #1E2235;
        color: #fff;
        z-index: 10;
      }
      .spinner {
        width: 30px;
        height: 30px;
        border: 3px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 10px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
      }
    </style>
    <style data-simulator>
      #gamepad {
        display: grid;
        grid-template-columns: repeat(3, 60px);
        gap: 10px;
        margin-top: 15px;
      }
      .btn {
        width: 60px;
        height: 50px;
        background: #333;
        border: 2px solid #555;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active {
        background: #666;
      }
      .btn-empty {
        background: transparent;
        border: none;
      }
      .soft-keys {
        display: flex;
        justify-content: space-between;
        width: 240px;
        margin-top: 20px;
      }
      .btn-soft {
        width: 80px;
        height: 35px;
        background: #444;
        border: 2px solid #666;
        border-radius: 4px;
        color: white;
        font-size: 14px;
        cursor: pointer;
        user-select: none;
        font-weight: bold;
      }
      .btn-soft:active {
        background: #777;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading...</div>
      </div>
    </div>
    <div class="soft-keys" data-simulator>
      <div class="btn-soft" style="display: flex; align-items: center; justify-content: center;" onclick="simulateKey('SoftLeft')">Back</div>
      <div class="btn-soft" style="display: flex; align-items: center; justify-content: center;" onclick="simulateKey('SoftRight')">Right</div>
    </div>
    <div id="gamepad" data-simulator>
      <div class="btn-empty"></div>
      <div class="btn" onclick="simulateKey('ArrowUp')">▲</div>
      <div class="btn-empty"></div>
      <div class="btn" onclick="simulateKey('ArrowLeft')">◀</div>
      <div class="btn" onclick="simulateKey('Enter')">OK</div>
      <div class="btn" onclick="simulateKey('ArrowRight')">▶</div>
      <div class="btn-empty"></div>
      <div class="btn" onclick="simulateKey('ArrowDown')">▼</div>
      <div class="btn-empty"></div>
    </div>

    <script data-simulator>
      function simulateKey(key) {
        document.body.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
        setTimeout(() => {
          document.body.dispatchEvent(new KeyboardEvent('keyup', { key: key, bubbles: true }));
        }, 50);
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.24.1/dist/phaser.min.js" defer></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
