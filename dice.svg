<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diceGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2CC" />
      <stop offset="35%" stop-color="#E6C45E" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8A6B15" />
    </linearGradient>
    <linearGradient id="diceBaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF4D4" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#5C4010" />
    </linearGradient>
    <linearGradient id="diceWhiteGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45" />
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <g>
    <!-- Outer Heavy Square Frame -->
    <rect x="18" y="18" width="164" height="164" rx="34" ry="34" fill="url(#diceGoldGrad)" stroke="#5C4010" stroke-width="0.5" />
    <rect x="21" y="21" width="158" height="158" rx="31" ry="31" fill="none" stroke="#5C4010" stroke-width="1.5" opacity="0.35" />

    <!-- Core Inside Cushion Face -->
    <rect x="23" y="23" width="154" height="154" rx="29" ry="29" fill="url(#diceBaseGrad)" stroke="url(#diceGoldGrad)" stroke-width="1.5" />
    <rect x="28" y="28" width="144" height="144" rx="24" ry="24" fill="none" stroke="#5C4010" stroke-width="0.8" opacity="0.25" />

    <!-- Corner corner-bracket filigree details -->
    <path d="M 36,44 L 44,44 L 44,36" fill="none" stroke="url(#diceGoldGrad)" stroke-width="1" opacity="0.6" />
    <path d="M 164,44 L 156,44 L 156,36" fill="none" stroke="url(#diceGoldGrad)" stroke-width="1" opacity="0.6" />
    <path d="M 36,156 L 44,156 L 44,164" fill="none" stroke="url(#diceGoldGrad)" stroke-width="1" opacity="0.6" />
    <path d="M 164,156 L 156,156 L 156,164" fill="none" stroke="url(#diceGoldGrad)" stroke-width="1" opacity="0.6" />

    <!-- Pips -->
    
      <g>
        <circle cx="60" cy="60" r="13" fill="black" opacity="0.3" />
        <circle cx="60" cy="60" r="11" fill="url(#diceGoldGrad)" stroke="#5C4010" stroke-width="0.8" />
        <circle cx="60" cy="60" r="8.5" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4" />
        <circle cx="56.5" cy="56.5" r="2.5" fill="#FFFFFF" opacity="0.95" />
      </g>
      <g>
        <circle cx="140" cy="140" r="13" fill="black" opacity="0.3" />
        <circle cx="140" cy="140" r="11" fill="url(#diceGoldGrad)" stroke="#5C4010" stroke-width="0.8" />
        <circle cx="140" cy="140" r="8.5" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4" />
        <circle cx="136.5" cy="136.5" r="2.5" fill="#FFFFFF" opacity="0.95" />
      </g>
      <g>
        <circle cx="140" cy="60" r="13" fill="black" opacity="0.3" />
        <circle cx="140" cy="60" r="11" fill="url(#diceGoldGrad)" stroke="#5C4010" stroke-width="0.8" />
        <circle cx="140" cy="60" r="8.5" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4" />
        <circle cx="136.5" cy="56.5" r="2.5" fill="#FFFFFF" opacity="0.95" />
      </g>
      <g>
        <circle cx="60" cy="140" r="13" fill="black" opacity="0.3" />
        <circle cx="60" cy="140" r="11" fill="url(#diceGoldGrad)" stroke="#5C4010" stroke-width="0.8" />
        <circle cx="60" cy="140" r="8.5" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4" />
        <circle cx="56.5" cy="136.5" r="2.5" fill="#FFFFFF" opacity="0.95" />
      </g>
      <g>
        <circle cx="60" cy="100" r="13" fill="black" opacity="0.3" />
        <circle cx="60" cy="100" r="11" fill="url(#diceGoldGrad)" stroke="#5C4010" stroke-width="0.8" />
        <circle cx="60" cy="100" r="8.5" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4" />
        <circle cx="56.5" cy="96.5" r="2.5" fill="#FFFFFF" opacity="0.95" />
      </g>
      <g>
        <circle cx="140" cy="100" r="13" fill="black" opacity="0.3" />
        <circle cx="140" cy="100" r="11" fill="url(#diceGoldGrad)" stroke="#5C4010" stroke-width="0.8" />
        <circle cx="140" cy="100" r="8.5" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4" />
        <circle cx="136.5" cy="96.5" r="2.5" fill="#FFFFFF" opacity="0.95" />
      </g>

    <!-- Glass Refraction Overlay -->
    <rect x="23" y="23" width="154" height="154" rx="29" ry="29" fill="url(#diceWhiteGloss)" pointer-events="none" />
    <path d="M 28 50 C 28 35, 35 28, 50 28 L 150 28" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.3" pointer-events="none" />
  </g>
